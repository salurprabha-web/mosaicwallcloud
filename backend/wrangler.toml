name = "mosaic-wall-backend"
main = "src/index.ts"
compatibility_date = "2024-03-04"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "mosaicwall.in/api/*", zone_name = "mosaicwall.in" },
  { pattern = "www.mosaicwall.in/api/*", zone_name = "mosaicwall.in" },
  { pattern = "mosaicwall.in/uploads/*", zone_name = "mosaicwall.in" },
  { pattern = "www.mosaicwall.in/uploads/*", zone_name = "mosaicwall.in" }
]

[vars]
FRONTEND_URL = "https://mosaicwall.in"
ALLOWED_ORIGINS = "https://mosaicwall.in,https://www.mosaicwall.in,https://mosaicwallcloud1.salurprabha.workers.dev"

# ✅ NEW — fixes the "display defaults until I push" bug. The
# MosaicRoom Durable Object needs to call this Worker's own
# /api/mosaic/:slug/init route to fetch saved config when a display
# screen connects. It previously guessed this URL at runtime via
# `currentHost`, which could be unset on certain DO instances and
# silently fell back to a non-existent localhost address. This makes
# it an explicit, always-correct binding instead.
SELF_URL = "https://mosaic-wall-backend.salurprabha.workers.dev"

# JWT_SECRET is set via: npx wrangler secret put JWT_SECRET
# (NOT stored here in plain text — see earlier security fix)

[[d1_databases]]
binding = "DB"
database_name = "mosaic-db"
database_id = "d12cb5b7-58c8-4161-b2c9-68d97d64b0b3"
migrations_dir = "prisma/migrations"

[[r2_buckets]]
binding = "UPLOADS_BUCKET"
bucket_name = "uploads-bucket"

[[durable_objects.bindings]]
name = "MOSAIC_ROOM"
class_name = "MosaicRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MosaicRoom"]
